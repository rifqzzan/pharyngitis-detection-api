<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharyngitis Detection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #1e293b;
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 8px;
            color: #38bdf8;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .upload-area {
            border: 2px dashed #334155;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #38bdf8;
            background: #0f172a;
        }

        .upload-area input { display: none; }

        .upload-icon { font-size: 48px; margin-bottom: 12px; }

        .upload-text { color: #94a3b8; font-size: 14px; }

        #preview {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background: #7dd3fc; }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

        .result {
            margin-top: 24px;
            padding: 20px;
            background: #0f172a;
            border-radius: 12px;
            display: none;
        }

        .result-label {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }

        .pharyngitis { color: #f87171; }
        .normal { color: #4ade80; }

        .confidence {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .explanation {
            background: #1e293b;
            border-left: 3px solid #38bdf8;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            color: #cbd5e1;
        }

        .loading {
            text-align: center;
            color: #38bdf8;
            margin-top: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 Pharyngitis Detection</h1>
        <p class="subtitle">Upload gambar endoskopi untuk deteksi faringitis menggunakan AI</p>

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)">
            <div class="upload-icon">📷</div>
            <p class="upload-text">Klik untuk upload gambar endoskopi</p>
        </div>

        <img id="preview" alt="Preview">

        <button id="detectBtn" onclick="detect()" disabled>Deteksi Sekarang</button>

        <div class="loading" id="loading">⏳ Menganalisis gambar...</div>

        <div class="result" id="result">
            <div class="result-label" id="resultLabel"></div>
            <div class="confidence" id="confidence"></div>
            <div class="explanation" id="explanation"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://pharyngitis-detection-api-production.up.railway.app";
        let selectedFile = null;

        function previewImage(event) {
            selectedFile = event.target.files[0];
            if (!selectedFile) return;

            const preview = document.getElementById('preview');
            preview.src = URL.createObjectURL(selectedFile);
            preview.style.display = 'block';
            document.getElementById('detectBtn').disabled = false;
            document.getElementById('result').style.display = 'none';
        }

        async function detect() {
            if (!selectedFile) return;

            const btn = document.getElementById('detectBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            btn.disabled = true;
            loading.style.display = 'block';
            result.style.display = 'none';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch(`${API_URL}/predict`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                document.getElementById('resultLabel').textContent = data.prediction;
                document.getElementById('resultLabel').className = 
                    'result-label ' + (data.prediction === 'Pharyngitis' ? 'pharyngitis' : 'normal');
                document.getElementById('confidence').textContent = `Confidence: ${data.confidence}`;
                document.getElementById('explanation').textContent = data.explanation;

                result.style.display = 'block';
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
